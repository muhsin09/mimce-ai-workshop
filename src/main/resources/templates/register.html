<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8"/>
    <title>Kayıt Ol &middot; Workshop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        :root {
            --brand: #0f766e;
            --brand-dark: #0b5f58;
            --text-strong: #1b2b34;
            --text-muted: #5d6b72;
            --bg: #f4f8f7;
            --panel: #ffffff;
            --border: #d3dfdc;
            --error: #9f2f26;
            --error-bg: #fbecec;
            --error-border: #efc6c3;
            --success: #1a6d47;
            --success-bg: #e7f4ec;
            --success-border: #c2dfcd;
            --shadow: 0 20px 40px rgba(24, 48, 45, 0.12);
            --focus: rgba(15, 118, 110, 0.24);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            font-family: "Manrope", "Avenir Next", "Segoe UI", "Noto Sans", sans-serif;
            color: var(--text-strong);
            background:
                radial-gradient(circle at 5% 0%, #e2f0ed 0%, transparent 32%),
                radial-gradient(circle at 100% 90%, #ebf5f3 0%, transparent 34%),
                var(--bg);
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            padding: 1.75rem;
        }

        h1 {
            margin: 0;
            font-size: 1.7rem;
            letter-spacing: -0.02em;
            color: var(--text-strong);
        }

        .subtitle {
            margin: 0.5rem 0 1.25rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.45;
        }

        label {
            display: block;
            margin: 0.75rem 0 0.4rem;
            font-size: 0.85rem;
            font-weight: 700;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            min-height: 2.8rem;
            border: 1px solid var(--border);
            border-radius: 0.625rem;
            padding: 0.65rem 0.8rem;
            font-size: 0.95rem;
            color: var(--text-strong);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px var(--focus);
        }

        .hint {
            margin: 0.4rem 0 0;
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .submit-btn {
            width: 100%;
            min-height: 2.8rem;
            margin-top: 1.1rem;
            border: 0;
            border-radius: 0.625rem;
            background: var(--brand);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .submit-btn:hover {
            background: var(--brand-dark);
        }

        .submit-btn:focus-visible,
        .link:focus-visible {
            outline: 0;
            box-shadow: 0 0 0 4px var(--focus);
        }

        .message {
            margin-top: 0.85rem;
            border-radius: 0.625rem;
            padding: 0.65rem 0.75rem;
            font-size: 0.88rem;
        }

        .message.error {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid var(--error-border);
        }

        .message.success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid var(--success-border);
        }

        .footer {
            margin-top: 1rem;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .link {
            color: var(--brand);
            font-weight: 700;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
<main class="card" aria-labelledby="register-title">
    <h1 id="register-title">Yeni Hesap Oluştur</h1>
    <p class="subtitle">TODO uygulamasını kullanmak için hızlıca kayıt ol.</p>

    <form th:action="@{/register}" method="post">
        <label for="username">Kullanıcı Adı</label>
        <input
            id="username"
            name="username"
            type="text"
            minlength="3"
            maxlength="32"
            required
            autocomplete="username"
            autofocus
        />
        <p class="hint">3-32 karakter aralığında olmalı.</p>

        <label for="password">Şifre</label>
        <input
            id="password"
            name="password"
            type="password"
            minlength="6"
            maxlength="64"
            required
            autocomplete="new-password"
        />
        <p class="hint">En az 6 karakter olmalı.</p>

        <button type="submit" class="submit-btn">Kayıt Ol</button>
    </form>

    <div class="message error" th:if="${errorMessage}" role="alert" th:text="${errorMessage}">
        Bu kullanici adi zaten kullaniliyor.
    </div>

    <div class="message success" th:if="${successMessage}" role="status" th:text="${successMessage}">
        Hesap olusturuldu.
    </div>

    <p class="footer">
        Hesabın var mı?
        <a class="link" th:href="@{/login}">Giriş ekranına dön</a>
    </p>
</main>
</body>
</html>
