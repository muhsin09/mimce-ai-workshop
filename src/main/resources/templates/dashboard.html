<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard &middot; Workshop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        :root {
            --primary: #5D5DFD;
            --primary-hover: #4747e0;
            --dark: #011624;
            --muted: #67737C;
            --bg: #F5F6FA;
            --border: #E2E5EA;
            --danger: #E53935;
            --success: #2E7D32;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--dark);
            min-height: 100vh;
            padding: 48px 24px;
        }
        .wrap {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(1, 22, 36, 0.08);
            padding: 32px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }
        h1 { margin: 0; font-size: 22px; }
        h2 { margin: 0 0 16px 0; font-size: 17px; color: var(--dark); }

        /* Logout */
        form.logout { margin: 0; }
        button.logout-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button.logout-btn:hover { background: var(--primary); color: #fff; }

        /* Add form */
        .add-form {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .add-form input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            color: var(--dark);
            outline: none;
            transition: border-color 0.15s;
        }
        .add-form input[type="text"]:focus { border-color: var(--primary); }
        .add-form button {
            padding: 10px 18px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .add-form button:hover { background: var(--primary-hover); }

        /* Todo list */
        .todo-list { list-style: none; margin: 0; padding: 0; }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .todo-item:last-child { border-bottom: none; }

        .todo-title {
            flex: 1;
            font-size: 15px;
            line-height: 1.4;
        }
        .todo-title.done {
            text-decoration: line-through;
            color: var(--muted);
        }

        /* Action buttons */
        .todo-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-toggle, .btn-delete {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-toggle {
            background: #EEF2FF;
            color: var(--primary);
        }
        .btn-toggle:hover { background: #DDE4FF; }
        .btn-toggle.undo {
            background: #F1F8E9;
            color: var(--success);
        }
        .btn-toggle.undo:hover { background: #DCEDC8; }
        .btn-delete {
            background: #FFEBEE;
            color: var(--danger);
        }
        .btn-delete:hover { background: #FFCDD2; }

        /* Empty state */
        .empty {
            text-align: center;
            color: var(--muted);
            padding: 32px 0;
            font-size: 14px;
        }

        /* Stats */
        .stats {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .stats span { font-weight: 600; color: var(--dark); }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>Merhaba, <span th:text="${username}">kullanici</span></h1>
        <form class="logout" th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Çıkış Yap</button>
        </form>
    </header>

    <h2>Görev Listem</h2>

    <!-- Add todo form -->
    <form class="add-form" th:action="@{/todos}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="text" name="title" placeholder="Yeni görev ekle..." maxlength="255" required autofocus/>
        <button type="submit">Ekle</button>
    </form>

    <!-- Stats -->
    <div class="stats" th:if="${!todos.isEmpty()}">
        <span th:text="${completedCount}">0</span>
        /
        <span th:text="${todos.size()}">0</span>
        görev tamamlandı
    </div>

    <!-- Todo list -->
    <ul class="todo-list" th:if="${!todos.isEmpty()}">
        <li class="todo-item" th:each="todo : ${todos}">
            <span class="todo-title" th:text="${todo.title}"
                  th:classappend="${todo.completed} ? 'done' : ''">Gorev baslik</span>

            <div class="todo-actions">
                <!-- Toggle -->
                <form th:action="@{/todos/{id}/toggle(id=${todo.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-toggle"
                            th:classappend="${todo.completed} ? ' undo' : ''"
                            th:text="${todo.completed} ? 'Geri Al' : 'Tamamla'">Tamamla</button>
                </form>

                <!-- Delete -->
                <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-delete">Sil</button>
                </form>
            </div>
        </li>
    </ul>

    <!-- Empty state -->
    <div class="empty" th:if="${todos.isEmpty()}">
        Henüz görev yok. Yukarıdaki alana yeni bir görev ekleyin.
    </div>
</div>
</body>
</html>
