<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard &middot; Workshop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        :root {
            --primary: #5D5DFD;
            --dark: #011624;
            --muted: #67737C;
            --bg: #F5F6FA;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--dark);
            min-height: 100vh;
            padding: 48px 24px;
        }
        .wrap {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(1, 22, 36, 0.08);
            padding: 32px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }
        h1 {
            margin: 0;
            font-size: 22px;
        }
        p.lead {
            color: var(--muted);
            margin: 0 0 24px 0;
            font-size: 15px;
        }
        form.logout { margin: 0; }
        button.logout-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button.logout-btn:hover {
            background: var(--primary);
            color: #fff;
        }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>Welcome, <span th:text="${username}">user</span></h1>
        <form class="logout" th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Sign out</button>
        </form>
    </header>
    <p class="lead">
        MIMCE AI WORKSHOP HOŞGELDİNİZ
    </p>
</div>
</body>
</html>
