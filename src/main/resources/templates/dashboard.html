<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard &middot; Workshop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        :root {
            --accent: #126a64;
            --accent-hover: #0f5a55;
            --title: #1a2f34;
            --text: #2f4348;
            --muted: #617378;
            --surface: #ffffff;
            --surface-soft: #f4f8f7;
            --border: #d7e2df;
            --danger: #b3261e;
            --danger-soft: #fdecea;
            --success: #1f7a4f;
            --success-soft: #eaf7ef;
            --shadow: 0 18px 40px rgba(26, 47, 52, 0.1);
            --focus-ring: rgba(18, 106, 100, 0.24);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Manrope", "Avenir Next", "Segoe UI", "Noto Sans", sans-serif;
            background:
                radial-gradient(circle at 10% 0%, #e4f1ee 0%, transparent 36%),
                radial-gradient(circle at 100% 100%, #edf5f2 0%, transparent 32%),
                #f8fbfa;
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .wrap {
            max-width: 880px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .welcome {
            margin: 0;
            font-size: 1.75rem;
            line-height: 1.2;
            color: var(--title);
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 0.5rem 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        h2 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--title);
        }

        form.logout {
            margin: 0;
        }

        .logout-btn {
            min-height: 2.5rem;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.5rem 0.95rem;
            border-radius: 0.625rem;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .logout-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 0.875rem;
            background: linear-gradient(180deg, #fbfdfc 0%, #f6faf8 100%);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .add-form {
            display: flex;
            gap: 0.625rem;
            margin-top: 0.75rem;
        }

        .add-form input[type="text"] {
            flex: 1;
            min-height: 2.75rem;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--border);
            border-radius: 0.625rem;
            font-size: 0.95rem;
            color: var(--title);
            outline: none;
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .add-form input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        .add-form button {
            min-height: 2.75rem;
            padding: 0.625rem 1rem;
            background: var(--accent);
            color: #fff;
            border: 0;
            border-radius: 0.625rem;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s ease;
        }

        .add-form button:hover {
            background: var(--accent-hover);
        }

        .add-form button:focus-visible,
        .logout-btn:focus-visible,
        .btn-toggle:focus-visible,
        .btn-delete:focus-visible {
            outline: 0;
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        .stats {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.825rem;
            color: var(--muted);
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 0.4rem 0.75rem;
            margin: 0 0 1rem;
        }

        .stats strong {
            color: var(--title);
            font-weight: 800;
        }

        .todo-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 0.625rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            background: #fff;
        }

        .todo-title {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--title);
            overflow-wrap: anywhere;
        }

        .todo-title.done {
            text-decoration: line-through;
            color: var(--muted);
        }

        .todo-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .btn-toggle,
        .btn-delete {
            min-height: 2rem;
            border-radius: 0.5rem;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            padding: 0.3rem 0.6rem;
            transition: background-color 0.2s ease;
        }

        .btn-toggle {
            background: #e8f2f1;
            color: var(--accent);
            border-color: #cfe0dd;
        }

        .btn-toggle:hover {
            background: #dcebea;
        }

        .btn-toggle.undo {
            background: var(--success-soft);
            color: var(--success);
            border-color: #c8e8d6;
        }

        .btn-toggle.undo:hover {
            background: #dff2e8;
        }

        .btn-delete {
            background: var(--danger-soft);
            color: var(--danger);
            border-color: #f6d0cb;
        }

        .btn-delete:hover {
            background: #f9dfdc;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 0.875rem;
            background: var(--surface-soft);
            padding: 2rem 1rem;
            font-size: 0.95rem;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.875rem;
        }

        @media (max-width: 768px) {
            .wrap {
                padding: 1.25rem;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: stretch;
            }

            .logout-btn {
                width: 100%;
            }

            .add-form {
                flex-direction: column;
            }

            .add-form button {
                width: 100%;
            }

            .todo-item {
                align-items: flex-start;
                flex-direction: column;
            }

            .todo-actions {
                width: 100%;
            }

            .todo-actions form {
                flex: 1;
            }

            .btn-toggle,
            .btn-delete {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="dashboard-header">
        <div>
            <h1 class="welcome">Merhaba, <span th:text="${username}">kullanici</span></h1>
            <p class="subtitle">Bugun hedeflerini netlestir ve gorevlerini takip et.</p>
        </div>
        <form class="logout" th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Çıkış Yap</button>
        </form>
    </header>

    <section class="panel" aria-labelledby="add-task-title">
        <h2 id="add-task-title">Yeni Gorev</h2>

        <!-- Add todo form -->
        <form class="add-form" th:action="@{/todos}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="text" name="title" placeholder="Yeni gorev ekle..." maxlength="255" required autofocus aria-label="Yeni gorev basligi"/>
            <button type="submit">Ekle</button>
        </form>
    </section>

    <div class="section-head">
        <h2>Gorev Listem</h2>
    </div>

    <!-- Stats -->
    <div class="stats" th:if="${!todos.isEmpty()}">
        <strong th:text="${completedCount}">0</strong>
        /
        <strong th:text="${todos.size()}">0</strong>
        görev tamamlandı
    </div>

    <!-- Todo list -->
    <ul class="todo-list" th:if="${!todos.isEmpty()}">
        <li class="todo-item" th:each="todo : ${todos}">
            <span class="todo-title" th:text="${todo.title}"
                  th:classappend="${todo.completed} ? 'done' : ''">Gorev baslik</span>

            <div class="todo-actions">
                <!-- Toggle -->
                <form th:action="@{/todos/{id}/toggle(id=${todo.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-toggle"
                            th:classappend="${todo.completed} ? ' undo' : ''"
                            th:text="${todo.completed} ? 'Geri Al' : 'Tamamla'">Tamamla</button>
                </form>

                <!-- Delete -->
                <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-delete">Sil</button>
                </form>
            </div>
        </li>
    </ul>

    <!-- Empty state -->
    <div class="empty" th:if="${todos.isEmpty()}">
        Henüz görev yok. Yukarıdaki alana yeni bir görev ekleyin.
    </div>
</div>
</body>
</html>
